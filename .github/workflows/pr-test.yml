name: PR Test Checks

on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Unit tests
        run: |
          python -m unittest discover -s tests -v

      - name: Short simulation smoke test
        run: |
          cat > ci_config.json <<'JSON'
          {
            "heat_duration_min": 8.0,
            "dt_s": 2.0,
            "measurement_noise_std": 0.0
          }
          JSON
          python eaf_simulator.py --config ci_config.json --output-dir ci_outputs

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-outputs
          path: ci_outputs/
